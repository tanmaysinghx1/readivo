<div class="fixed top-5 right-5 z-50 flex flex-col gap-3 pointer-events-none w-80 max-w-[calc(100vw-40px)] animate-fadeIn">
  @for (toast of toastService.toasts(); track toast.id) {
    <div 
      class="pointer-events-auto flex items-start gap-3 p-3.5 rounded-xl bg-stone-900/95 backdrop-blur-md border shadow-lg transition-all duration-300 animate-slideIn"
      [ngClass]="getToastBorderClass(toast.type)"
    >
      <!-- Type Icon Indicator -->
      <div class="shrink-0 mt-0.5" [ngClass]="getToastIconColorClass(toast.type)">
        @switch (toast.type) {
          @case ('success') {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          }
          @case ('error') {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          }
          @case ('warning') {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
            </svg>
          }
          @case ('info') {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 111.063.852l-.708 2.836a.75.75 0 001.063.852l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
            </svg>
          }
        }
      </div>

      <!-- Message Text -->
      <div class="flex-1 min-w-0">
        <p class="text-xs font-semibold text-stone-200 leading-normal select-text">{{ toast.message }}</p>
      </div>

      <!-- Close Button -->
      <button 
        (click)="toastService.dismiss(toast.id)"
        class="shrink-0 text-stone-500 hover:text-stone-300 hover:bg-stone-850/50 p-0.5 rounded-lg transition-colors"
        title="Dismiss"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>
