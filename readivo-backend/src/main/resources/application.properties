spring.application.name=readivo-backend

# Database Configurations (Aiven Cloud MySQL over SSL)
spring.datasource.url=jdbc:mysql://db1625-db1625.i.aivencloud.com:23308/defaultdb?useSSL=true&verifyServerCertificate=false&allowPublicKeyRetrieval=true
spring.datasource.username=avnadmin
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Custom JWT Authentication Settings
# HS256 key generated for signing JWT tokens securely
readivo.app.jwtSecret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
readivo.app.jwtExpirationMs=86400000

# Cloudflare R2 Storage Configurations
cloudflare.r2.endpoint=https://b3b63af80b90bdd45a47a5e47bf93091.r2.cloudflarestorage.com
cloudflare.r2.bucket-name=readivo
cloudflare.r2.access-key=
cloudflare.r2.secret-key=
cloudflare.r2.public-url-prefix=https://b3b63af80b90bdd45a47a5e47bf93091.r2.cloudflarestorage.com/readivo

# Multipart Upload configurations (allows uploading large books/PDFs up to 100MB)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
